<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Signup | HiddenHive</title>

  <!-- Main CSS -->
  <link rel="stylesheet" href="assets/css/style.css" />

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
body.auth-page {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
}

/* Background video */
#bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.6) contrast(1.1) saturate(1.2);
  z-index: -2;
}

/* Overlay gradient */
.auth-overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    rgba(0,0,0,0.7),
    rgba(255, 94, 0, 0.3)
  );
  z-index: -1;
}

/* Wrapper */
.auth-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  padding: 20px;
}

/* Card (glass effect) */
.auth-card {
  display: flex;
  width: 900px;
  max-width: 100%;
  border-radius: 20px;
  overflow: hidden;
  backdrop-filter: blur(18px);
  background: rgba(255,255,255,0.08);
  box-shadow: 0 10px 50px rgba(0,0,0,0.7);
  border: 1px solid rgba(255,255,255,0.2);
  animation: fadeIn 1s ease;
}

/* Left */
.auth-left {
  flex: 1;
  padding: 40px;
  color: #fff;
}

.auth-left h1 {
  font-size: 28px;
  text-shadow: 0 0 15px rgba(255, 140, 0, 0.6);
}

.section-label {
  font-size: 0.85rem;
  color: #ff7f50;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Right */
.auth-right {
  flex: 1;
  padding: 40px;
  background: rgba(0,0,0,0.7);
  color: #fff;
}

.auth-right h2 {
  margin-bottom: 20px;
}

/* Inputs */
.auth-input-group {
  margin-bottom: 18px;
}

.auth-input-group label {
  display: block;
  margin-bottom: 6px;
  font-size: 0.9rem;
}

.auth-input-group input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.1);
  color: #fff;
  transition: 0.3s;
}

/* Placeholder */
.auth-input-group input::placeholder {
  color: rgba(255,255,255,0.6);
}

/* Focus glow */
.auth-input-group input:focus {
  border: 1px solid #ff7f50;
  box-shadow: 0 0 12px rgba(255, 127, 80, 0.8);
  background: rgba(255,255,255,0.15);
}

/* Button */
.auth-btn {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(45deg,#ff7f50,#ff3c00);
  color: #fff;
  font-weight: bold;
  letter-spacing: 1px;
  cursor: pointer;
  transition: 0.3s ease;
}

.auth-btn:hover {
  transform: scale(1.05);
  background: linear-gradient(45deg,#ff9a44,#ff5e00);
  box-shadow: 0 5px 25px rgba(255, 94, 0, 0.7);
}

.auth-btn:active {
  transform: scale(0.96);
}

/* Switch */
.auth-switch {
  margin-top: 15px;
  font-size: 0.9rem;
}

.auth-switch a {
  color: #ff7f50;
  text-decoration: none;
}

.auth-switch a:hover {
  text-decoration: underline;
}

/* Animation */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Responsive */
@media (max-width: 768px) {
  .auth-card {
    flex-direction: column;
  }
}
</style>
</head>

<body class="auth-page">

  <!-- Background Video -->
  <video autoplay muted loop playsinline id="bg-video">
    <source src="assets/videos/istockphoto-2041465190-640_adpp_is.mp4" type="video/mp4">
  </video>

  <!-- Overlay -->
  <div class="auth-overlay"></div>

  <!-- Main Section -->
  <section class="auth-wrapper">
    <div class="auth-card">

      <!-- Left Content -->
      <div class="auth-left">
        <p class="section-label">Join the Journey</p>
        <h1>Create Your Account</h1>
        <p>
          Sign up to explore Gujarat’s hidden gems and get a more personalized experience.
        </p>
      </div>

      <!-- Right Form -->
      <div class="auth-right">
        <h2>Signup</h2>

        <form onsubmit="signupUser(); return false;">
          
          <!-- Name -->
          <div class="auth-input-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your name" required />
          </div>

          <!-- Email -->
          <div class="auth-input-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email" required />
          </div>

          <!-- Phone -->
          <div class="auth-input-group">
            <label for="phone">Phone Number</label>
            <input 
              type="tel" 
              id="phone" 
              placeholder="Enter phone number" 
              pattern="[0-9]{10}" 
              maxlength="10"
              required 
            />
          </div>

          <!-- Password -->
          <div class="auth-input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" minlength="6" required />
          </div>

          <button type="submit" class="auth-btn">Create Account</button>

        </form>

        <p class="auth-switch">
          Already have an account? <a href="login.html">Login</a>
        </p>
      </div>

    </div>
  </section>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
