<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup | Hidden Gems of Gujarat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <section class="auth-wrapper">
    <div class="auth-overlay"></div>

    <div class="auth-card">
      <div class="auth-left">
        <p class="section-label">Join the Journey</p>
        <h1>Create Your Account</h1>
        <p>
          Sign up to unlock a more personal travel experience and explore
          Gujarat's hidden gems in a smarter way.
        </p>
      </div>

      <div class="auth-right">
        <h2>Signup</h2>

        <div class="auth-input-group">
          <label for="newUsername">Username</label>
          <input type="text" id="newUsername" placeholder="Create username" />
        </div>

        <div class="auth-input-group">
          <label for="newPassword">Password</label>
          <input type="password" id="newPassword" placeholder="Create password" />
        </div>

        <button class="auth-btn" onclick="signupUser()">Create Account</button>

        <p class="auth-switch">
          Already have an account?
          <a href="login.html">Login</a>
        </p>

      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
