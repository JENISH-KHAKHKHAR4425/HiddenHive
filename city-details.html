<style>

/* Smooth scroll */
html { scroll-behavior: smooth; }

/* Navbar (same as index) */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 50px;
  display: flex;
  justify-content: space-between;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
}
.category-subtitle {
  font-size: 1.1rem;
  margin-top: 10px;
  color: #ff7f50;
  letter-spacing: 1px;
  text-shadow: 0 0 10px rgba(255,127,80,0.5);
}

.logo { color: #fff; font-size: 1.8rem; font-weight: bold; }
.nav-links { display: flex; gap: 30px; list-style: none; }
.nav-links a {
  color: #fff;
  text-decoration: none;
  position: relative;
}
.nav-links a::after {
  content: '';
  position: absolute;
  width: 0%;
  height: 2px;
  background: #ff7f50;
  bottom: -4px;
  left: 0;
  transition: 0.3s;
}
.nav-links a:hover::after { width: 100%; }

/* HERO (same premium style) */
.hero {
  height: 90vh;
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  text-align: center;
}
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.hero-content {
  position: relative;
  color: #fff;
  animation: fadeIn 1.2s ease;
}
@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1;}
}

/* SECTION */
.section { padding: 80px 20px; }

/* CATEGORY GRID */
.city-category-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr); /* 4 in one row */
  gap: 20px;
}

@media (max-width: 1024px) {
  .city-category-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 600px) {
  .city-category-grid {
    grid-template-columns: 1fr;
  }
}

/* CARD */
.city-category-card {
  height: 100px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  text-align: center;

  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);

  transition: 0.3s;
}

.city-category-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* Category Colors */
[data-category="Park"] { background: linear-gradient(135deg,#56ab2f,#a8e063); }
[data-category="Temple"] { background: linear-gradient(135deg,#f7971e,#ffd200); }
[data-category="Cafe"] { background: linear-gradient(135deg,#ff416c,#ff4b2b); }
[data-category="Museum"] { background: linear-gradient(135deg,#1a2980,#26d0ce); }
[data-category="Waterfall"] { background: linear-gradient(135deg,#56ccf2,#2f80ed); }
[data-category="Hill Station"] { background: linear-gradient(135deg,#614385,#516395); }
[data-category="Adventure"] { background: linear-gradient(135deg,#ff5f6d,#ffc371); }
[data-category="Beach"] { background: linear-gradient(135deg,#00c6ff,#0072ff); }
/* Footer */
.footer {
  text-align: center;
  padding: 40px;
  background: linear-gradient(to right,#111,#222);
  color: #fff;
}

.footer h3 {
  color: #ff7f50;
}

.footer p {
  color: #ccc;
}

</style>

  const cityId = params.get("city") || "rajkot";
  const city = cityExplorerData[cityId];

  const title = document.getElementById("cityTitle");
  const grid = document.getElementById("cityCategoryGrid");
  const hero = document.getElementById("heroSection");

  if (!city) return;

  title.innerText = city.name;
  hero.style.backgroundImage = `url(${city.heroImage})`;

  const categories = [...new Set(city.places.map(p => p.type))];

  const icons = {
    Park:"🌳", Temple:"🛕", Cafe:"☕",
    Museum:"🏛️", Waterfall:"💧", "Hill Station":"⛰️",Adventure: "🎯",
    Beach: "🏖️"
  };

  categories.forEach(cat => {
    if (!cat) return;

    const card = document.createElement("div");
    card.className = "city-category-card";
    card.setAttribute("data-category", cat);

    card.innerHTML = `${icons[cat] || "📍"}<br>${cat}`;

    card.onclick = () => {
      window.location.href = `category.html?city=${cityId}&category=${encodeURIComponent(cat)}`;
    };

    grid.appendChild(card);
  });

});
