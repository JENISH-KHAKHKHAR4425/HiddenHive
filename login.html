<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Hidden Gems of Gujarat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <section class="auth-wrapper">
    <div class="auth-overlay"></div>

    <div class="auth-card">
      <div class="auth-left">
        <p class="section-label">Welcome Back</p>
        <h1>Login to Explore Hidden Gujarat</h1>
        <p>
          Sign in to continue your journey through Gujarat's lesser-known places,
          hidden stories, and local treasures.
        </p>
      </div>

      <div class="auth-right">
        <h2>Login</h2>

        <div class="auth-input-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter username" />
        </div>

        <div class="auth-input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" />
        </div>

        <button class="auth-btn" onclick="loginUser()">Login</button>

        <p class="auth-switch">
          Don't have an account?
          <a href="signup.html">Create one</a>
        </p>

      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
