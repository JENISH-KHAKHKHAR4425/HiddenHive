body {

/* ===== NAVBAR ===== */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 50px;
  display: flex;
  justify-content: space-between;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
}
.logo { color: #fff; font-size: 1.8rem; font-weight: bold; }
.nav-links { display: flex; gap: 30px; list-style: none; }
.nav-links a { color: #fff; text-decoration: none; }

/* ===== HERO ===== */
.hero {
  height: 60vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  color: #fff;
  text-align: center;
}

/* ===== SECTION ===== */
.section { padding: 100px 20px; }

/* ===== GRID ===== */
.place-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 25px;
}

/* ===== CARD ===== */
.place-card {
  background: #fff;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 8px 25px rgba(0,0,0,0.15);
  transition: 0.4s;
  opacity: 0;
  transform: translateY(30px);
  animation: fadeUp 0.6s forwards;
}

.place-card:hover {
  transform: translateY(-8px) scale(1.02);
}

/* ===== ANIMATION ===== */
@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* IMAGE */
.place-card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* CONTENT */
.place-content {
  padding: 15px;
}

.place-content h3 {
  margin: 0;
  font-size: 18px;
}

.place-content p {
  font-size: 14px;
  color: #555;
  margin: 8px 0;

/* BUTTON */
.btn {

  margin-top: 10px;
  padding: 8px 15px;
  background: linear-gradient(135deg,#ff7f50,#ff9966);
  color: #fff;
  border-radius: 20px;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  background: linear-gradient(135deg,#ff5e3a,#ff7f50);
}

const params = new URLSearchParams(window.location.search);
const cityId = params.get("city");
const category = params.get("category");

const title = document.getElementById("categoryTitle");
const cityText = document.getElementById("cityName");
const grid = document.getElementById("placeGrid");

const city = cityExplorerData[cityId];

if (!city) {
  title.innerText = "City not found ❌";
} else {

  title.innerText = category;
  cityText.innerText = "Explore " + category + " in " + city.name;

  const filtered = city.places.filter(p => p.type === category);

  if (filtered.length === 0) {
    grid.innerHTML = "<p>No places found 😢</p>";
  }

  filtered.forEach((place, index) => {

    const card = document.createElement("div");
    card.className = "place-card";
    card.style.animationDelay = (index * 0.1) + "s";

    card.innerHTML = `
      <img src="https://source.unsplash.com/400x300/?${place.name},${category}" alt="${place.name}">
      <div class="place-content">
        <h3>${place.name}</h3>
        <p>✨ Discover the beauty of ${place.name}, one of the best ${category.toLowerCase()} spots in ${city.name}. A perfect place to explore and relax.</p>

      </div>
    `;
